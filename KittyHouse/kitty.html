<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Hello Kitty (Three.js)</title>
  <link rel="icon" type="image/png" href="./assets/Scene 3D/favicon.png" sizes="32x32">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <meta name="description" content="particles.js is a lightweight JavaScript library for creating particles.">
  <link rel="stylesheet" media="screen" href="css/style.css">
  <style>
    body{
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    html,body { height:100%; margin:0; font-family:system-ui,Segoe UI,Roboto,Arial; background: linear-gradient(180deg,#6c7fb1 0%, #907e9e 40%, #a25879 70%, #fec2e6 100%); }
    #ui {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 20;
      background: transparent;
      padding: 12px;
      border-radius: 10px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.12);
      width: 260px;
      max-height: none; 
      overflow: visible; 
      margin-top:40px;
    }
    #ui h3 { margin:0 0 8px 0; font-size:15px; text-align: center; color: #13e8e9; }
    #ui label { display:block; margin:6px 0 3px; font-size:13px; font-weight: bold; }
    #ui input[type="range"] { width:100%; }
    #ui input[type="color"] { width:48px; height:28px; padding:0; border:0; vertical-align:middle; }
    #ui .row { display:flex; gap:8px; align-items:center; }
    #ui button { margin-top:8px; width:100%; padding:8px 10px; border-radius:8px; border:0; background:#000022; color:#13E8E9; cursor:pointer;  font-family: Helvetica, Arial, sans-serif !important; font-weight: bold; }
    #ui .small { width:auto; padding:6px 8px; font-size:13px; background:#eee; color:#222; }
    #ui select {
      background-color: #000022;
      color: #13E8E9;           
      font-family: Helvetica, Arial, sans-serif;
      font-weight: bold;
      border-radius: 4px;
      border: 2px solid #fff;
      padding: 6px;
      appearance: none; 
      -webkit-appearance: none;
      -moz-appearance: none;
     cursor: pointer;
    } 
    #ui select::-ms-expand {
     display: none; 
    }
    @media (max-width:640px){
      #ui { width: 92%; left:4%; top:8px; padding:10px; }
    }
     #toggleCurtainsIcon {
       width:80px;
       height:80px;
       cursor:pointer;
       position:fixed;
       right:30px;
       bottom:240px;
       z-index:30;
     }
     #randomizeIcon {
        width: 100px;
        height: 100px;
        cursor: pointer;
        position: fixed;
        right: 20px;   
        bottom: 120px;
        z-index: 30;
      }
      #resetIcon {
        width: 50px;
        height: 50px;
        cursor: pointer;
        position: fixed;
        right: 45px;
        bottom: 40px;
        z-index: 50;
        font-weight:bold;
      }

      #enterHouse {
        position: fixed;
        right: 35px;
        bottom: 520px;
        width: 60px;
        cursor: pointer;
        z-index: 50;
      }

      #exitHouse {
        position: fixed;
        right: 40px;
        bottom: 460px;
        width: 40px;
        cursor: pointer;
        z-index: 50;
      }
  </style>
</head>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const music = document.getElementById("bgMusic");
    if (music) {
      music.volume = 0.6; 
      music.play().catch(() => {
        document.addEventListener("click", () => music.play(), { once: true });
      });
    }
  });
</script>
<body>
<audio id="bgMusic" src="./assets/music/chinese-bambo-music.mp3" loop></audio>
<canvas id="canvas"></canvas>
<div id="snow"></div>
<div id="particles-js"></div>
<script src="../particles.js"></script>
<script src="./js/app.js"></script>



<div id="ui">
  <h3>Hello Kitty</h3>

  <label>Presets
    <div class="row">
      <select id="preset" class="count-particles" style="flex:1">
        <option value="classic">Classic</option>
        <option value="pink">Pink Dream</option>
        <option value="night">Night Mode</option>
        <option value="pastel">Pastel</option>
      </select>
      <button id="applyPreset" class="small">Appliquer</button>
    </div>
  </label>

  <label>Couleur du nœud
    <div class="row"><input id="colorBow" type="color" value="#e6002d"> <span id="colBowText" style="margin-left:6px">#e6002d</span></div>
  </label>

  <label>Couleur t-shirt
    <div class="row"><input id="colorShirt" type="color" value="#ffea00"> <span id="colShirtText">#ffea00</span></div>
  </label>

  <label>Couleur salopette
    <div class="row"><input id="colorOverall" type="color" value="#0a86dc"> <span id="colOverallText">#0a86dc</span></div>
  </label>

  <label>Position X
    <input id="posX" class="neon-range" type="range" min="-4" max="11" step="0.01" value="0">
  </label>

  <label>Position Z
    <input id="posZ" class="neon-range" type="range" min="-5" max="5" step="0.01" value="0">
  </label>

  <label>Rotation Y
    <input id="rotY" class="neon-range" type="range" min="-3.14" max="3.14" step="0.01" value="0.0">
  </label>

  <label>Rotation X
    <input id="rotX" class="neon-range" type="range" min="-3.14" max="3.14" step="0.01" value="0.0">
  </label>

  <label>Rotation Z
    <input id="rotZ" class="neon-range" type="range" min="-3.14" max="3.14" step="0.01" value="0.0">
  </label>

  <img id="randomizeIcon" src="assets/Scene 3D/manikin.svg" alt="Randomize Colors">
  <img id="resetIcon" src="assets/Scene 3D/restart.svg" alt="Reset">
  </div>
  <img id="toggleCurtainsIcon" src="assets/Scene 3D/curtain.svg" alt="Toggle Curtains">
  <img id="enterHouse" src="assets/Scene 3D/house.svg">
  <img id="exitHouse" src="assets/Scene 3D/exit.svg">


<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script type="module">
  import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
  import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { FBXLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/FBXLoader.js';

  // ---------- Textures ----------
  const textureLoader = new THREE.TextureLoader();

  // ---------- Matériau pour le mur ----------
  const wallMaterial = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    roughness: 0.8,
    metalness: 0,
    flatShading: true
  });


  // ---------- Scene / Camera / Renderer ----------
  const scene = new THREE.Scene();

  const loader = new GLTFLoader();
  let backgroundModel = null;
  const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 100);
  camera.position.set(-18, 6, 40);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setClearColor(0x000000, 0); 
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;


  const canvasElement = renderer.domElement;
  canvasElement.style.zIndex = '1'; 
  canvasElement.style.position = 'fixed';
  canvasElement.style.top = '0';
  canvasElement.style.left = '0';

  //-----------------Animation In house-------------
  const indoorCameraPosition = { x:-5, y: 1.5, z: 0 };
  const indoorCameraLookAt   = { x: 15, y: 30, z: 0 };
  document.getElementById("enterHouse").addEventListener("click", () => {

    gsap.to(camera.position, {
      duration: 5,
      x: indoorCameraPosition.x,
      y: indoorCameraPosition.y,
      z: indoorCameraPosition.z,
      ease: "power2.inOut",
      onUpdate: () => {
        camera.lookAt(indoorCameraLookAt.x, indoorCameraLookAt.y, indoorCameraLookAt.z);
      }
    });

    controls.enabled = false;

    setTimeout(() => { controls.enabled = true; }, 2200);
  });

  //------------------Animation Out of house-------------
  document.getElementById("exitHouse").addEventListener("click", () => {

    gsap.to(camera.position, {
      duration: 2,
      x: -18,
      y: 6,
      z: 40,
      ease: "power2.inOut",
      onUpdate: () => {
        camera.lookAt(0, 1.1, 0);
      }
    });

    controls.enabled = false;
    setTimeout(() => { controls.enabled = true; }, 2000);
  });


  // ---------- Controls ----------
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.12;
  controls.target.set(0, 1.1, 0);
  
  // ---------- Lights ----------
  scene.add(new THREE.AmbientLight(0xffffff, 1.2));
  
  const keyLight = new THREE.DirectionalLight(0xffffff, 1.5);
  keyLight.position.set(4, 6, 6);
  keyLight.castShadow = true;
  keyLight.shadow.camera.left = -8;
  keyLight.shadow.camera.right = 8;
  keyLight.shadow.camera.top = 8;
  keyLight.shadow.camera.bottom = -8;
  keyLight.shadow.camera.near = 0.5;
  keyLight.shadow.camera.far = 30;
  keyLight.shadow.mapSize.set(2048, 2048);
  keyLight.shadow.bias = -0.0006;
  scene.add(keyLight);
  
  const fillLight = new THREE.DirectionalLight(0xffffff, 0.4);
  fillLight.position.set(-5, 3, 2);
  scene.add(fillLight);


  //------------------GRASS--------------------------------
  const grassTexture = textureLoader.load("./assets/Scene 3D/grassTexture.webp");

  // Répétition de la texture
  grassTexture.wrapS = THREE.RepeatWrapping;
  grassTexture.wrapT = THREE.RepeatWrapping;
  grassTexture.repeat.set(15, 15); 

  // ----- SOL 3D AVEC TEXTURE -----
  const groundGeo = new THREE.PlaneGeometry(200, 200);
  const groundMat = new THREE.MeshStandardMaterial({
    map: grassTexture,
    roughness: 0.9,
  });

  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -3;
  ground.receiveShadow = true;

  scene.add(ground);



  // ---------- Pièce complète (sol + murs avec épaisseur) ----------
  // Sol avec texture parquet et ÉPAISSEUR
  const floorGeometry = new THREE.BoxGeometry(30, 2, 20); // 0.3 d'épaisseur
  const floorMaterial = new THREE.MeshStandardMaterial({ 
    roughness: 0.8,
    metalness: 0.1
  });

  // Charger texture du sol
  textureLoader.load(
    './assets/Scene 3D/parquet.jpg',
    function(texture) {
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(4, 4);

      floorMaterial.map = texture;
      floorMaterial.needsUpdate = true;
    },
    undefined,
    function(err) {
      console.error('Erreur de chargement texture sol:', err);
      floorMaterial.color = new THREE.Color(0xb31414);
    }
  );

  const floor = new THREE.Mesh(floorGeometry, floorMaterial);
  floor.position.set(5.35, -2.65, 0.35);
  floor.receiveShadow = true;
  scene.add(floor);

  //  GROUPE GLOBAL DU MUR ARRIÈRE
  const backWallGroup = new THREE.Group();
  scene.add(backWallGroup);

  //  GEOMETRIE DU MUR ARRIÈRE COURBÉ
  const wallShape = new THREE.Shape();
  const wallWidth = 30;
  const wallHeight = 12;

  const windowWidth = 8;
  const windowHeight = 6;
  const windowY = 4;
  const windowZ = -10;

  // Contour du mur
  wallShape.moveTo(-wallWidth / 2, 0);
  wallShape.lineTo(wallWidth / 2, 0);
  wallShape.lineTo(wallWidth / 2, wallHeight);
  wallShape.lineTo(-wallWidth / 2, wallHeight);
  wallShape.lineTo(-wallWidth / 2, 0);

  // Trou = fenêtre
  const windowHole = new THREE.Path();
  windowHole.moveTo(-windowWidth / 2, windowY);
  windowHole.lineTo(windowWidth / 2, windowY);
  windowHole.lineTo(windowWidth / 2, windowY + windowHeight);
  windowHole.lineTo(-windowWidth / 2, windowY + windowHeight);
  windowHole.lineTo(-windowWidth / 2, windowY);

  wallShape.holes.push(windowHole);

  // Épaisseur
  const extrudeSettings = {
    depth: 0.5,
    bevelEnabled: false
  };


  const wallGeometry = new THREE.ExtrudeGeometry(wallShape, extrudeSettings);

  const flatBackWall = new THREE.Mesh(
    wallGeometry,
    new THREE.MeshStandardMaterial({
      color: 0xffffff,
      roughness: 0.7
    })
  );

  flatBackWall.position.set(0, -3.65, windowZ - 0.15);
  flatBackWall.receiveShadow = true;
  backWallGroup.add(flatBackWall);

  //  CADRE DE LA FENÊTRE
  const frameThickness = 0.2;
  const frameMaterial1 = new THREE.MeshStandardMaterial({ color: 0xffffff });

  function createFrame(x, y, w, h) {
    const geom = new THREE.BoxGeometry(w, h, 0.3);
    const mesh = new THREE.Mesh(geom, frameMaterial1);
    mesh.position.set(x, y, windowZ + 0.3);
    return mesh;
  }

  // Bordures de la fenetre
  backWallGroup.add(createFrame(0, 6.4, windowWidth + 0.3, frameThickness)); 
  backWallGroup.add(createFrame(0, 0.25, windowWidth + 0.3, frameThickness));
  backWallGroup.add(createFrame(-windowWidth / 2 - 0.15, 3.5, frameThickness, windowHeight));
  backWallGroup.add(createFrame(windowWidth / 2 + 0.15, 3.5, frameThickness, windowHeight));

  // Barres internes e la fenetre
  function addCrossbar(x, y, w, h) {
    const bar = new THREE.Mesh(
      new THREE.BoxGeometry(w, h, 0.3),
      frameMaterial1
    );
    bar.position.set(x, y, windowZ + 0.02);
    backWallGroup.add(bar);
  }

  addCrossbar(-windowWidth / 6 + 0.3, 3.325, 0.15, windowHeight);
  addCrossbar(windowWidth / 6 - 0.3, 3.325, 0.15, windowHeight);
  addCrossbar(0, 2.3, windowWidth, 0.15);
  addCrossbar(0, 4.35, windowWidth, 0.15);

  //  VITRE de le fenetre
  const glassMaterial = new THREE.MeshPhysicalMaterial({
    color: 0xffffff,
    metalness: 0,
    roughness: 0.1,
    transmission: 0.8,
    transparent: true
  });

  const glass = new THREE.Mesh(
    new THREE.BoxGeometry(windowWidth, windowHeight, 0.05),
    glassMaterial
  );

  glass.position.set(0, 3.3, windowZ + 0.39);
  backWallGroup.add(glass);

  //  RIDEAUX
  const curtainTexture = textureLoader.load('./assets/Scene 3D/TextureRouge.jpg');
  curtainTexture.wrapS = THREE.RepeatWrapping;
  curtainTexture.wrapT = THREE.RepeatWrapping;
  curtainTexture.repeat.set(2, 4);

  const curtainMaterial = new THREE.MeshStandardMaterial({
    map: curtainTexture,
    side: THREE.DoubleSide,
    roughness: 0.9
  });

  function createCurtain(width, height, xPosition) {
    const geom = new THREE.PlaneGeometry(width, height, 40, 200);
    const curtain = new THREE.Mesh(geom, curtainMaterial);

    curtain.position.set(xPosition, 3, windowZ + 0.9);
    curtain.castShadow = true;

    // plis des rideaux
    const verts = geom.attributes.position;
    const count = verts.count;

    for (let i = 0; i < count; i++) {
      const x = verts.getX(i);
      const wave = Math.sin((x / width) * Math.PI * 9) * 0.25;
      verts.setZ(i, wave);
    }

    verts.needsUpdate = true;
    return curtain;
  }

  const curtainLeft = createCurtain(4, 9, -4.5);
  curtainLeft.rotation.y = -0.1;
  backWallGroup.add(curtainLeft);

  const curtainRight = createCurtain(4, 9, 4.5);
  curtainRight.rotation.y = 0.1;
  backWallGroup.add(curtainRight);

  //  TRINGLE DE RIDEAU
  const tringleMaterial = new THREE.MeshStandardMaterial({
    color: 0x9e0000,
    roughness: 0.6,
    metalness: 0.2
  });

  // barre de rideau
  const barLength = 14;
  const barRadius = 0.12;

  const barGeometry = new THREE.CylinderGeometry(barRadius, barRadius, barLength, 32);
  const bar = new THREE.Mesh(barGeometry, tringleMaterial);

  bar.rotation.z = Math.PI / 2;
  bar.position.set(0, 7, windowZ + 0.8);
  bar.castShadow = true;

  backWallGroup.add(bar);

  // Positions ouvertes (actuelles)
  const leftOpenX = curtainLeft.position.x;
  const rightOpenX = curtainRight.position.x;

  // Positions fermées (les rideaux se rejoignent au centre)
  const leftClosedX = -2;
  const rightClosedX = 2;

  let curtainsClosed = false; 
  function animateCurtains() {
    const speed = 0.05; 

    if (curtainsClosed) {
      // Rideaux se ferment
      curtainLeft.position.x += (leftClosedX - curtainLeft.position.x) * speed;
      curtainRight.position.x += (rightClosedX - curtainRight.position.x) * speed;
    } else {
      // Rideaux s'ouvrent
      curtainLeft.position.x += (leftOpenX - curtainLeft.position.x) * speed;
      curtainRight.position.x += (rightOpenX - curtainRight.position.x) * speed;
    }
  }


  // supports
  function createSupport(xPos) {
    const support = new THREE.Mesh(
      new THREE.SphereGeometry(0.35, 32, 32),
      tringleMaterial
    );
    support.position.set(xPos, 7, windowZ + 0.8);
    return support;
  }

  backWallGroup.add(createSupport(-barLength / 2));
  backWallGroup.add(createSupport(barLength / 2));

  //  POSITION GLOBALE DU MUR
  backWallGroup.position.set(5.35, 0, 0);      
  backWallGroup.rotation.y = 0;
  backWallGroup.scale.set(1, 1, 1);


  // ---------MUR GAUCHE -----------
  const wallpaper = textureLoader.load("./assets/Scene 3D/WallTexture.jpg");
  wallpaper.wrapS = THREE.RepeatWrapping;
  wallpaper.wrapT = THREE.RepeatWrapping;
  wallpaper.repeat.set(0.2, 0.2); 

  const leftShape = new THREE.Shape();
  const wallH=18;
  const wallW = 20;
  const arcRadiusXb = 10;
  const arcRadiusYb = 6;

  leftShape.moveTo(0, 0);
  leftShape.lineTo(wallW, 0);
  leftShape.lineTo(wallW, wallH  - arcRadiusYb);

  leftShape.quadraticCurveTo(
    wallW / 2, wallH  + arcRadiusYb,
    0, wallH - arcRadiusYb
  );

  leftShape.lineTo(0, 0);

  const leftExtrude = {
    depth: 1,
    bevelEnabled: false
  };

  const leftWallCurveGeometry = new THREE.ExtrudeGeometry(leftShape, leftExtrude);


  const leftWallCurve = new THREE.Mesh(
    leftWallCurveGeometry,
    new THREE.MeshStandardMaterial({
    map: wallpaper,
    roughness: 0.8,
  })
  );

  // Orientation
  leftWallCurve.rotation.y = Math.PI / 2;

  // Position
  leftWallCurve.position.set(-10.65, -3.65, 9.85);

  leftWallCurve.receiveShadow = true;
  scene.add(leftWallCurve);

  // Activer les ombres
  floor.receiveShadow = true;


  // ------------ MUR DROIT --------------
  const rightWallpaper = wallpaper;

  // shape du mur droit
  const rightShape = new THREE.Shape();
  rightShape.moveTo(0, 0);
  rightShape.lineTo(wallW, 0);
  rightShape.lineTo(wallW, wallH - arcRadiusYb);

  rightShape.quadraticCurveTo(
    wallW / 2,
    wallH + arcRadiusYb,
    0,
    wallH - arcRadiusYb
  );

  rightShape.lineTo(0, 0);

  // extrusion
  const rightExtrude = {
    depth: 1,
    bevelEnabled: false
  };

  const rightWallGeometry = new THREE.ExtrudeGeometry(rightShape, rightExtrude);

  const rightWall = new THREE.Mesh(
    rightWallGeometry,
    new THREE.MeshStandardMaterial({
      map: rightWallpaper,
      roughness: 0.8,
    })
  );

  // orientation : inversée par rapport au mur gauche
  rightWall.rotation.y = -Math.PI / 2;

  // position : symétrique du mur gauche
  rightWall.position.set(21.35, -3.65, -10.15);

  rightWall.receiveShadow = true;

  scene.add(rightWall);

  //--------Tableau Kitty Familly---
  const tableauGroup = new THREE.Group();

  // Dimensions du tableau
  const width = 2;    // largeur
  const height = 2; // hauteur
  const depth = 0.05; // épaisseur du cadre

  // Charger la texture Hello Kitty
  const loader3 = new THREE.TextureLoader();
  const kittyTexture = loader3.load('./assets/Scene 3D/KittyFamilly.png');

  // Plan intérieur (l'image)
  const planeGeometry = new THREE.PlaneGeometry(width, height);
  const planeMaterial = new THREE.MeshStandardMaterial({ 
      map: kittyTexture
  });
  const plane = new THREE.Mesh(planeGeometry, planeMaterial);
  plane.position.z = depth / 2; 
  tableauGroup.add(plane); 

  // Cadre 3D (bordure)
  const frameMaterial = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
  const thickness = 0.05;

  // Top
  const topBorder = new THREE.Mesh(new THREE.BoxGeometry(width + thickness*2, thickness, depth), frameMaterial);
  topBorder.position.set(0, height/2 + thickness/2, 0);
  tableauGroup.add(topBorder);

  // Bottom
  const bottomBorder = new THREE.Mesh(new THREE.BoxGeometry(width + thickness*2, thickness, depth), frameMaterial);
  bottomBorder.position.set(0, -height/2 - thickness/2, 0);
  tableauGroup.add(bottomBorder);

  // Left
  const leftBorder = new THREE.Mesh(new THREE.BoxGeometry(thickness, height, depth), frameMaterial);
  leftBorder.position.set(-width/2 - thickness/2, 0, 0);
  tableauGroup.add(leftBorder);

  // Right
  const rightBorder = new THREE.Mesh(new THREE.BoxGeometry(thickness, height, depth), frameMaterial);
  rightBorder.position.set(width/2 + thickness/2, 0, 0);
  tableauGroup.add(rightBorder);

  tableauGroup.position.set(-9.6, 7, 1.5);
  tableauGroup.rotation.set(0, Math.PI/2, 0);


  // Ajouter le groupe à la scène
  scene.add(tableauGroup);
  tableauGroup.scale.set(2, 2, 2); 

  //------ Tableau ribbon 1------------
  
  // Créer un groupe pour le tableau
  const tableauGroup0 = new THREE.Group();

  // Dimensions du tableau
  const width0 = 1.2;    // largeur
  const height0 = 1.5; // hauteur
  const depth0 = 0.05; // épaisseur du cadre

  // Charger la texture Hello Kitty
  const loader0 = new THREE.TextureLoader();
  const kittyTexture0 = loader0.load('./assets/Scene 3D/tableau.jpg'); 

  // Plan intérieur (l'image)
  const planeGeometry0 = new THREE.PlaneGeometry(width0, height0);
  const planeMaterial0 = new THREE.MeshStandardMaterial({ 
      map: kittyTexture0
  });
  const plane0 = new THREE.Mesh(planeGeometry0, planeMaterial0);
  plane0.position.z = depth0 / 2;
  tableauGroup0.add(plane0); 

  // Cadre 3D (bordure)

  const frameMaterial0 = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
  const thickness0 = 0.05;

  // Top
  const topBorder0 = new THREE.Mesh(new THREE.BoxGeometry(width0 + thickness0*2, thickness0, depth0), frameMaterial0);
  topBorder0.position.set(0, height0/2 + thickness0/2, 0);
  tableauGroup0.add(topBorder0);

  // Bottom
  const bottomBorder0 = new THREE.Mesh(new THREE.BoxGeometry(width0 + thickness0*2, thickness0, depth0), frameMaterial0);

  console.log("Hello Kitty scene ready!");
</script>
